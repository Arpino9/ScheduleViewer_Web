<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScheduleViewer</title>
  <link rel="stylesheet" href="/css/style.css?v=4">
</head>
<body>
  <div id="app">
    <!-- サイドバー: カレンダー -->
    <aside id="sidebar">
      <header id="cal-header">
        <button id="btn-prev">&#8592;</button>
        <span id="cal-title"></span>
        <button id="btn-next">&#8594;</button>
      </header>
      <div id="cal-grid">
        <div class="dow">月</div><div class="dow">火</div><div class="dow">水</div>
        <div class="dow">木</div><div class="dow">金</div>
        <div class="dow weekend">土</div><div class="dow weekend">日</div>
      </div>
      <div id="reload-bar">
        <button class="reload-btn" onclick="reloadAll()">&#8635; 全て再読込</button>
        <button class="reload-btn auth-btn" onclick="showAuthPanel()">&#128273; 認証管理</button>
      </div>
    </aside>

    <!-- メイン: 日別詳細 -->
    <main id="detail">
      <div id="detail-header">
        <span id="detail-date">日付を選択してください</span>
      </div>

      <!-- タブ -->
      <nav id="tabs">
        <button class="tab active" data-tab="schedule">スケジュール</button>
        <button class="tab" data-tab="tasks">タスク</button>
        <button class="tab" data-tab="health">健康</button>
        <button class="tab" data-tab="books">本</button>
        <button class="tab" data-tab="expenditure">収支</button>
        <button class="tab" data-tab="photos">写真</button>
        <button class="tab" data-tab="anime">アニメ</button>
      </nav>

      <!-- タブコンテンツ -->
      <div id="tab-content">
        <div id="pane-schedule" class="pane active"><div class="empty">日付を選択してください</div></div>
        <div id="pane-tasks"    class="pane"><div class="empty">日付を選択してください</div></div>
        <div id="pane-health"   class="pane"><div class="empty">日付を選択してください</div></div>
        <div id="pane-books"    class="pane"><div class="empty">日付を選択してください</div></div>
        <div id="pane-expenditure" class="pane"><div class="empty">日付を選択してください</div></div>
        <div id="pane-photos"   class="pane"><div class="empty">日付を選択してください</div></div>
        <div id="pane-anime"    class="pane"><div class="empty">日付を選択してください</div></div>
      </div>
    </main>
  </div>
  <!-- 認証パネル -->
  <div id="auth-overlay">
    <div id="auth-panel">
      <div id="auth-header">
        <span>Google 認証管理</span>
        <button onclick="hideAuthPanel()">&#x2715;</button>
      </div>
      <div id="auth-body">
        <p class="auth-desc">未認証のサービスはデータを取得できません。<br>「認証する」を押すとブラウザが開きます。</p>
        <div id="auth-list"></div>
        <div style="margin-top:16px;display:flex;gap:8px;">
          <button class="auth-action-btn" onclick="authorizeAll(this)">&#128273; 全て認証する</button>
          <button class="auth-action-btn secondary" onclick="refreshAuthStatus()">&#8635; 状態を更新</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 写真拡大モーダル -->
  <div id="modal-overlay">
    <button id="modal-close" onclick="closeModal()">&#x2715;</button>
    <img id="modal-img" src="" alt="写真">
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
